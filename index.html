<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ウマ娘グループ一覧</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <h1>ウマ娘グループ一覧</h1>
  </header>

  <main id="app">
    <p class="loading">読み込み中...</p>
  </main>

  <!-- 詳細モーダル -->
  <div class="modal-overlay" id="modal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-name">
      <button class="modal-close" id="modal-close" aria-label="閉じる">×</button>
      <div class="modal-body">
        <img class="modal-image" id="modal-image" src="" alt="">
        <div class="modal-info">
          <h2 class="modal-name" id="modal-name"></h2>
          <p class="modal-description" id="modal-description"></p>
          <dl class="modal-stats">
            <dt>足のサイズ</dt>
            <dd id="modal-shoe-size"></dd>
            <dt>スリーサイズ</dt>
            <dd id="modal-three-sizes"></dd>
            <dt>所属グループ</dt>
            <dd id="modal-groups"></dd>
          </dl>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
